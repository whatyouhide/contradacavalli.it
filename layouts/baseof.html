<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="m-0 min-h-screen flex flex-col text-ink font-sans leading-[1.45]">
  <a class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:bg-ink focus:text-white focus:px-2.5 focus:py-1.5" href="#main-content">Vai al contenuto</a>
  <div class="max-w-[1200px] w-[calc(100%-2rem)] mx-auto pt-4 flex-1 flex flex-col">
    {{ partial "header.html" . }}
    <main id="main-content" class="pb-8 lg:pb-10">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
</body>
</html>
