    <div>
      <h2 class="font-heading text-ink text-xl tracking-wide">Dove Siamo</h2>
      <p class="mt-1">
        <a href="{{ site.Params.maps_url }}" target="_blank" rel="noopener">{{ site.Params.address }}</a>
      </p>

    <div class="flex flex-col items-end max-md:items-center gap-1">
      <p><a class="text-ink no-underline" href="tel:{{ site.Params.contact_phone }}">{{ site.Params.contact_phone }}</a></p>
      <p>&copy; {{ now.Year }} Contrada Cavalli</p>

  </div>
