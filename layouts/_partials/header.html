<header class="animate-in flex justify-between items-center gap-4 py-4">
  <a class="flex gap-3 items-center no-underline" href="#home">
    <img class="logo-mark w-[50px] h-[50px] object-contain" src="/images/logo-cc.png" alt="Logo Contrada Cavalli">
    <span class="font-heading text-2xl font-normal tracking-wide">Contrada Cavalli</span>
  </a>
  <div class="flex gap-2 items-center">
    <a class="btn !p-3 lg:!px-3.5 flex items-center gap-1.5" href="{{ site.Params.instagram }}" target="_blank" rel="noopener" aria-label="Instagram">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      <span class="hidden lg:inline text-[0.85rem]">Instagram</span>
    </a>
    <a class="btn !p-3 lg:!px-3.5 flex items-center gap-1.5" href="{{ site.Params.facebook }}" target="_blank" rel="noopener" aria-label="Facebook">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      <span class="hidden lg:inline text-[0.85rem]">Facebook</span>
    </a>
    <a class="btn !p-3 lg:!px-3.5 flex items-center gap-1.5" href="mailto:{{ site.Params.contact_email }}" aria-label="Email">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 6h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"/><path d="m22 8-10 7L2 8"/></svg>
      <span class="hidden lg:inline text-[0.85rem]">Email</span>
    </a>
    <a class="btn max-md:hidden" href="tel:{{ site.Params.contact_phone }}">{{ site.Params.contact_phone }}</a>
    <a class="btn-olive max-md:hidden" href="{{ site.Params.playtomic_url }}" target="_blank" rel="noopener">Prenota</a>
  </div>
</header>
